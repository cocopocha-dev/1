<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ブロックパズル</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div id="score-section">
      <div id="score-label">スコア</div>
      <div id="score-value">0</div>
    </div>
    <div id="best-section">
      <div id="best-label">ベスト</div>
      <div id="best-value">0</div>
    </div>
  </header>

  <div id="board-container">
    <canvas id="board-canvas"></canvas>
    <div id="ghost-overlay"></div>
  </div>

  <div id="pieces-tray"></div>

  <div id="game-over-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h2>ゲームオーバー</h2>
      <p>スコア: <span id="final-score">0</span></p>
      <button id="restart-btn" class="btn-primary">もう一度プレイ</button>
    </div>
  </div>

  <div id="bonus-popup" class="hidden">
    <span>ALL CLEAR BONUS! +500</span>
  </div>

  <div id="combo-popup" class="hidden">
    <span id="combo-text"></span>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
